steps:
  # Step 1: Build Docker image (independent frontend repo)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'Dockerfile'
      - '-t'
      - 'gcr.io/$PROJECT_ID/aria-frontend:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/aria-frontend:latest'
      - '.'

  # Step 2: Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/aria-frontend']

  # Step 3: Deploy to Cloud Run (independent service from backend)
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'aria-frontend'
      - '--image=gcr.io/$PROJECT_ID/aria-frontend:latest'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=10'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--port=8080'
      - '--timeout=300'

images:
  - 'gcr.io/$PROJECT_ID/aria-frontend:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/aria-frontend:latest'

options:
  machineType: 'E2_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY

timeout: '1200s'
